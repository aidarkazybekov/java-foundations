<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play — CoreCraft</title>
<script>(function(){try{var t=localStorage.getItem('jf-theme')||(window.matchMedia&&matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);var l=localStorage.getItem('jf-lang')||((navigator.language||'en').slice(0,2)==='ru'?'ru':'en');document.documentElement.setAttribute('data-lang',l);}catch(e){}})();</script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <div style="display:flex; align-items:center; gap:1.6rem;">
    <a class="brand" href="index.html"><span class="dot"></span>CoreCraft</a>
    <nav class="topnav">
      <a href="learn.html" data-i18n="navLearn">Learn</a>
      <a href="play.html" data-i18n="navPlay">Play</a>
      <a href="contribute.html" data-i18n="navContribute">Contribute</a>
    </nav>
  </div>
  <div style="display:flex; gap:8px;">
    <button id="lang-toggle" class="theme-toggle" onclick="toggleLang()" aria-label="switch language" style="width:auto; padding:0 12px; font-size:13px; font-weight:600;">RU</button>
    <button id="theme-toggle" class="theme-toggle" onclick="toggleTheme()" aria-label="toggle theme">☾</button>
  </div>
</div>

<p class="kicker" data-i18n="kicker">Play</p>
<h1 data-i18n="title" style="font-size:32px;">Interactive visualizations</h1>
<p class="lead" data-i18n="lead">Open any one and play — each explains a data structure or concurrency idea step by step, in light or dark, EN or RU.</p>

<div class="grid" id="play-grid"></div>

<footer class="site-footer" style="grid-template-columns:1fr;">
  <div class="footer-bottom" style="border-top:none; margin-top:0;">
    <span>← <a href="index.html">CoreCraft</a></span>
    <a href="https://github.com/aidarkazybekov/java-foundations">GitHub ↗</a>
  </div>
</footer>

<script src="cards.js"></script>
<script>
window.I18N = {
  en: { navLearn:"Learn", navPlay:"Play", navContribute:"Contribute",
        kicker:"Play", title:"Interactive visualizations",
        lead:"Open any one and play — each explains a data structure or concurrency idea step by step, in light or dark, EN or RU." },
  ru: { navLearn:"Изучить", navPlay:"Играть", navContribute:"Вклад",
        kicker:"Играть", title:"Интерактивные визуализации",
        lead:"Открой любую и поиграй — каждая объясняет структуру данных или идею конкурентности по шагам, в светлой/тёмной теме, EN/RU." }
};
function render(){
  if(!window.__viz) return;
  var lang = jfLang();
  document.getElementById('play-grid').innerHTML = window.__viz.map(function(v){ return jfCardHTML(v,'viz',lang); }).join('');
}
window.onLangChange = render;
jfLoad(function(d){ window.__viz = d.visualizations; render(); });
</script>
<script src="theme.js"></script>
<script src="lang.js"></script>
</body>
</html>
