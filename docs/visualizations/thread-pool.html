<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thread pool — java-foundations</title>
<script>(function(){try{var t=localStorage.getItem('jf-theme')||(window.matchMedia&&matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="topbar">
  <a class="brand" href="../index.html"><span class="dot"></span>← java-foundations</a>
  <button id="theme-toggle" class="theme-toggle" onclick="toggleTheme()" aria-label="toggle theme">☾</button>
</div>
<h1>Пул потоков (MyThreadPool)</h1>
<p class="lead">Задачи падают в очередь, 3 воркера сами их разбирают (когда задач нет — простаивают, как <code>take()</code> на пустой очереди). Жми submit.</p>

<div style="display:flex; gap:8px; flex-wrap:wrap; margin:1rem 0; align-items:center;">
  <button onclick="tpSubmit(1)">submit task</button>
  <button onclick="tpSubmit(5)">submit 5</button>
  <button onclick="tpReset()">reset</button>
</div>

<div style="font-size:13px; color:var(--color-text-secondary); margin:.5rem 0 4px;">очередь задач (первой берётся левая →)</div>
<div id="tp-queue" style="display:flex; gap:6px; flex-wrap:wrap; min-height:40px; padding:8px; border:0.5px dashed var(--color-border-secondary); border-radius:var(--border-radius-md);"></div>

<div style="font-size:13px; color:var(--color-text-secondary); margin:1rem 0 4px;">потоки-воркеры</div>
<div id="tp-workers" style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px;"></div>

<div id="tp-stat" style="font-size:13px; color:var(--color-text-tertiary); margin-top:10px;"></div>

<script>
const TP_WORKERS = 3;
const TP_RUN_TICKS = 4;
let tpQueue, tpW, tpNext, tpDone;

function tpReset() {
  tpQueue = [];
  tpW = [];
  for (let i = 0; i < TP_WORKERS; i++) tpW.push({ task: null, left: 0 });
  tpNext = 1;
  tpDone = 0;
  tpRender();
}

function tpSubmit(n) {
  for (let i = 0; i < n; i++) tpQueue.push(tpNext++);
  tpRender();
}

function tpTick() {
  for (const w of tpW) {
    if (w.task !== null) {
      w.left--;
      if (w.left <= 0) { w.task = null; tpDone++; }
    }
  }
  for (const w of tpW) {
    if (w.task === null && tpQueue.length > 0) {
      w.task = tpQueue.shift();
      w.left = TP_RUN_TICKS;
    }
  }
  tpRender();
}

function tpRender() {
  const q = document.getElementById('tp-queue');
  q.innerHTML = tpQueue.length ? '' : '<span style="color:var(--color-text-tertiary); font-size:13px; align-self:center;">пусто — воркеры простаивают</span>';
  tpQueue.forEach(t => {
    const chip = document.createElement('div');
    chip.style.cssText = 'width:34px; height:34px; border-radius:var(--border-radius-md); background:var(--color-background-info); color:var(--color-text-info); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:500; border:0.5px solid var(--color-border-secondary);';
    chip.textContent = t;
    q.appendChild(chip);
  });

  const box = document.getElementById('tp-workers');
  box.innerHTML = '';
  tpW.forEach((w, i) => {
    const busy = w.task !== null;
    const card = document.createElement('div');
    card.style.cssText = 'border-radius:var(--border-radius-lg); padding:1rem; text-align:center; border:0.5px solid var(--color-border-secondary); '
      + (busy ? 'background:var(--color-background-success); color:var(--color-text-success);' : 'background:var(--color-background-secondary); color:var(--color-text-tertiary);');
    card.innerHTML = '<div style="font-size:12px; opacity:.8;">воркер ' + (i + 1) + '</div>'
      + '<div style="font-size:16px; font-weight:500; margin-top:6px;">' + (busy ? '▶ task ' + w.task : 'idle') + '</div>';
    box.appendChild(card);
  });

  document.getElementById('tp-stat').textContent =
    'в очереди: ' + tpQueue.length + '  ·  выполнено: ' + tpDone;
}

tpReset();
setInterval(tpTick, 250);
</script>
<script src="../theme.js"></script>
</body>
</html>
