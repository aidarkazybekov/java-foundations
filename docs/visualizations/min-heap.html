<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Min-heap — java-foundations</title>
<script>(function(){try{var t=localStorage.getItem('jf-theme')||(window.matchMedia&&matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="topbar">
  <a class="brand" href="../index.html"><span class="dot"></span>← java-foundations</a>
  <button id="theme-toggle" class="theme-toggle" onclick="toggleTheme()" aria-label="toggle theme">☾</button>
</div>
<h1>Бинарная куча (MyPriorityQueue)</h1>
<p class="lead">Полное дерево в массиве: родитель ≤ детей, минимум всегда в корне. <code>add</code> всплывает (sift-up), <code>poll</code> топит (sift-down). 🟢 корень = минимум, 🟡 узел, который только что двигался.</p>

<div style="display:flex; gap:8px; flex-wrap:wrap; margin:1rem 0;">
  <button onclick="hpAdd()">add random</button>
  <button onclick="hpPoll()">poll min</button>
  <button onclick="hpReset()">reset</button>
</div>

<div id="hp-tree" style="width:100%; margin:.5rem 0;"></div>

<div style="font-size:13px; color:var(--color-text-secondary); margin:.25rem 0;">массив (индекс под каждой ячейкой)</div>
<div id="hp-arr" style="display:flex; gap:8px; flex-wrap:wrap; margin:.25rem 0 1rem;"></div>

<div id="hp-msg" style="font-size:14px; color:var(--color-text-secondary); line-height:1.7;"></div>

<script>
let hp = [];
let hpHi = -1;
let hpMsg = 'Пустая куча. Добавь несколько чисел — минимум всплывёт в корень.';
const HP_W = 640;

function hpSwap(i, j) { const t = hp[i]; hp[i] = hp[j]; hp[j] = t; }

function hpSiftUp(i) {
  while (i > 0) {
    const p = (i - 1) >> 1;
    if (hp[i] >= hp[p]) break;
    hpSwap(i, p);
    i = p;
  }
  return i;
}

function hpSiftDown(i) {
  const n = hp.length;
  while (true) {
    let s = i, l = 2 * i + 1, r = 2 * i + 2;
    if (l < n && hp[l] < hp[s]) s = l;
    if (r < n && hp[r] < hp[s]) s = r;
    if (s === i) break;
    hpSwap(i, s);
    i = s;
  }
  return i;
}

function hpAdd() {
  if (hp.length >= 15) { hpMsg = 'Демо ограничено 15 узлами. Сделай poll.'; hpRender(); return; }
  const v = 1 + Math.floor(Math.random() * 98);
  hp.push(v);
  const end = hp.length - 1;
  hpHi = hpSiftUp(end);
  hpMsg = 'add(' + v + '): положили в индекс ' + end + ', всплыл до индекса ' + hpHi + '. Корень (мин) = ' + hp[0] + '.';
  hpRender();
}

function hpPoll() {
  if (hp.length === 0) { hpMsg = 'Пусто. Забирать нечего.'; hpRender(); return; }
  const min = hp[0];
  const last = hp.pop();
  if (hp.length > 0) { hp[0] = last; hpHi = hpSiftDown(0); }
  else hpHi = -1;
  hpMsg = 'poll() = ' + min + ': последний элемент в корень, потом утопили вниз. Новый мин = ' + (hp.length ? hp[0] : 'нет') + '.';
  hpRender();
}

function hpReset() { hp = []; hpHi = -1; hpMsg = 'Сброс.'; hpRender(); }

function hpNodePos(i) {
  const d = Math.floor(Math.log2(i + 1));
  const inLevel = i - (Math.pow(2, d) - 1);
  const count = Math.pow(2, d);
  return { x: HP_W * (inLevel + 0.5) / count, y: 34 + d * 70 };
}

function hpRender() {
  const n = hp.length;
  const maxD = n ? Math.floor(Math.log2(n)) : 0;
  const H = 60 + maxD * 70;
  let svg = '<svg viewBox="0 0 ' + HP_W + ' ' + H + '" width="100%" role="img" style="max-height:340px">';
  for (let i = 1; i < n; i++) {
    const a = hpNodePos((i - 1) >> 1), b = hpNodePos(i);
    svg += '<line x1="' + a.x + '" y1="' + a.y + '" x2="' + b.x + '" y2="' + b.y + '" style="stroke:var(--color-border-secondary)" stroke-width="1.5"/>';
  }
  for (let i = 0; i < n; i++) {
    const p = hpNodePos(i);
    const isRoot = i === 0;
    const isHi = i === hpHi;
    const fill = isRoot ? 'var(--color-background-success)' : (isHi ? 'var(--color-background-warning)' : 'var(--color-background-info)');
    const tcol = isRoot ? 'var(--color-text-success)' : (isHi ? 'var(--color-text-warning)' : 'var(--color-text-info)');
    svg += '<circle cx="' + p.x + '" cy="' + p.y + '" r="19" style="fill:' + fill + '; stroke:var(--color-border-secondary)" stroke-width="1"/>';
    svg += '<text x="' + p.x + '" y="' + (p.y + 5) + '" text-anchor="middle" style="fill:' + tcol + '; font-size:15px; font-weight:500; font-family:var(--font-sans)">' + hp[i] + '</text>';
    svg += '<text x="' + p.x + '" y="' + (p.y - 26) + '" text-anchor="middle" style="fill:var(--color-text-tertiary); font-size:11px; font-family:var(--font-sans)">' + i + '</text>';
  }
  svg += '</svg>';
  document.getElementById('hp-tree').innerHTML = n ? svg : '<div style="color:var(--color-text-tertiary); padding:1.5rem 0; font-size:14px">пусто</div>';

  const arr = document.getElementById('hp-arr');
  arr.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex; flex-direction:column; align-items:center; gap:4px;';
    const cell = document.createElement('div');
    const isRoot = i === 0, isHi = i === hpHi;
    cell.style.cssText = 'width:46px; height:46px; border-radius:var(--border-radius-md); display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:500; border:0.5px solid var(--color-border-secondary);'
      + (isRoot ? 'background:var(--color-background-success); color:var(--color-text-success);' : isHi ? 'background:var(--color-background-warning); color:var(--color-text-warning);' : 'background:var(--color-background-info); color:var(--color-text-info);');
    cell.textContent = hp[i];
    const idx = document.createElement('div');
    idx.style.cssText = 'font-size:11px; color:var(--color-text-tertiary);';
    idx.textContent = '[' + i + ']';
    wrap.appendChild(cell); wrap.appendChild(idx);
    arr.appendChild(wrap);
  }
  document.getElementById('hp-msg').textContent = hpMsg;
}

hpRender();
</script>
<script src="../theme.js"></script>
</body>
</html>
