<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Min-heap — java-foundations</title>
<script>(function(){try{var t=localStorage.getItem('jf-theme')||(window.matchMedia&&matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);var l=localStorage.getItem('jf-lang')||((navigator.language||'en').slice(0,2)==='ru'?'ru':'en');document.documentElement.setAttribute('data-lang',l);}catch(e){}})();</script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="topbar">
  <a class="brand" href="../index.html"><span class="dot"></span>← java-foundations</a>
  <div style="display:flex; gap:8px;">
    <button id="lang-toggle" class="theme-toggle" onclick="toggleLang()" aria-label="switch language" style="width:auto; padding:0 12px; font-size:13px; font-weight:600;">RU</button>
    <button id="theme-toggle" class="theme-toggle" onclick="toggleTheme()" aria-label="toggle theme">☾</button>
  </div>
</div>
<h1 data-i18n="title">Binary heap (MyPriorityQueue)</h1>
<p class="lead" data-i18n="lead">A complete tree stored in an array: parent ≤ children, the minimum is always at the root. <code>add</code> bubbles up (sift-up), <code>poll</code> sinks down (sift-down). 🟢 root = minimum, 🟡 the node that just moved.</p>

<div style="display:flex; gap:8px; flex-wrap:wrap; margin:1rem 0;">
  <button onclick="hpAdd()" data-i18n="btnAdd">add random</button>
  <button onclick="hpPoll()" data-i18n="btnPoll">poll min</button>
  <button onclick="hpReset()" data-i18n="btnReset">reset</button>
</div>

<div id="hp-tree" style="width:100%; margin:.5rem 0;"></div>

<div style="font-size:13px; color:var(--color-text-secondary); margin:.25rem 0;" data-i18n="arrLabel">array (index under each cell)</div>
<div id="hp-arr" style="display:flex; gap:8px; flex-wrap:wrap; margin:.25rem 0 1rem;"></div>

<div id="hp-msg" style="font-size:14px; color:var(--color-text-secondary); line-height:1.7;"></div>

<script>
window.I18N = {
  en: { title: "Binary heap (MyPriorityQueue)",
        lead: 'A complete tree stored in an array: parent ≤ children, the minimum is always at the root. <code>add</code> bubbles up (sift-up), <code>poll</code> sinks down (sift-down). 🟢 root = minimum, 🟡 the node that just moved.',
        btnAdd: "add random", btnPoll: "poll min", btnReset: "reset",
        arrLabel: "array (index under each cell)" },
  ru: { title: "Бинарная куча (MyPriorityQueue)",
        lead: 'Полное дерево в массиве: родитель ≤ детей, минимум всегда в корне. <code>add</code> всплывает (sift-up), <code>poll</code> топит (sift-down). 🟢 корень = минимум, 🟡 узел, который только что двигался.',
        btnAdd: "add random", btnPoll: "poll min", btnReset: "reset",
        arrLabel: "массив (индекс под каждой ячейкой)" }
};
var MSG = {
  en: {
    empty: "Empty heap. Add a few numbers — the minimum bubbles up to the root.",
    capped: "Demo is capped at 15 nodes. Poll first.",
    emptyPoll: "Empty. Nothing to poll.",
    none: "none", emptyTree: "empty",
    add: function (v,end,hi,root){ return 'add(' + v + '): placed at index ' + end + ', bubbled up to index ' + hi + '. Root (min) = ' + root + '.'; },
    poll: function (min,newMin){ return 'poll() = ' + min + ': last element to the root, then sifted down. New min = ' + newMin + '.'; },
    reset: "Reset."
  },
  ru: {
    empty: "Пустая куча. Добавь несколько чисел — минимум всплывёт в корень.",
    capped: "Демо ограничено 15 узлами. Сделай poll.",
    emptyPoll: "Пусто. Забирать нечего.",
    none: "нет", emptyTree: "пусто",
    add: function (v,end,hi,root){ return 'add(' + v + '): положили в индекс ' + end + ', всплыл до индекса ' + hi + '. Корень (мин) = ' + root + '.'; },
    poll: function (min,newMin){ return 'poll() = ' + min + ': последний элемент в корень, потом утопили вниз. Новый мин = ' + newMin + '.'; },
    reset: "Сброс."
  }
};
function L(){ return document.documentElement.getAttribute('data-lang') || 'en'; }
function T(){ return MSG[L()]; }

let hp = [];
let hpHi = -1;
let hpMsgKey = { k: 'empty' };
const HP_W = 640;

function hpSetMsg(k, val){ hpMsgKey = { k: k, val: val }; }

function hpSwap(i, j) { const t = hp[i]; hp[i] = hp[j]; hp[j] = t; }

function hpSiftUp(i) {
  while (i > 0) {
    const p = (i - 1) >> 1;
    if (hp[i] >= hp[p]) break;
    hpSwap(i, p);
    i = p;
  }
  return i;
}

function hpSiftDown(i) {
  const n = hp.length;
  while (true) {
    let s = i, l = 2 * i + 1, r = 2 * i + 2;
    if (l < n && hp[l] < hp[s]) s = l;
    if (r < n && hp[r] < hp[s]) s = r;
    if (s === i) break;
    hpSwap(i, s);
    i = s;
  }
  return i;
}

function hpAdd() {
  if (hp.length >= 15) { hpSetMsg('capped'); hpRender(); return; }
  const v = 1 + Math.floor(Math.random() * 98);
  hp.push(v);
  const end = hp.length - 1;
  hpHi = hpSiftUp(end);
  hpSetMsg('add', [v, end, hpHi, hp[0]]);
  hpRender();
}

function hpPoll() {
  if (hp.length === 0) { hpSetMsg('emptyPoll'); hpRender(); return; }
  const min = hp[0];
  const last = hp.pop();
  if (hp.length > 0) { hp[0] = last; hpHi = hpSiftDown(0); }
  else hpHi = -1;
  hpSetMsg('poll', [min, hp.length ? hp[0] : null]);
  hpRender();
}

function hpReset() { hp = []; hpHi = -1; hpSetMsg('reset'); hpRender(); }

function hpNodePos(i) {
  const d = Math.floor(Math.log2(i + 1));
  const inLevel = i - (Math.pow(2, d) - 1);
  const count = Math.pow(2, d);
  return { x: HP_W * (inLevel + 0.5) / count, y: 34 + d * 70 };
}

function hpRender() {
  const t = T();
  const n = hp.length;
  const maxD = n ? Math.floor(Math.log2(n)) : 0;
  const H = 60 + maxD * 70;
  let svg = '<svg viewBox="0 0 ' + HP_W + ' ' + H + '" width="100%" role="img" style="max-height:340px">';
  for (let i = 1; i < n; i++) {
    const a = hpNodePos((i - 1) >> 1), b = hpNodePos(i);
    svg += '<line x1="' + a.x + '" y1="' + a.y + '" x2="' + b.x + '" y2="' + b.y + '" style="stroke:var(--color-border-secondary)" stroke-width="1.5"/>';
  }
  for (let i = 0; i < n; i++) {
    const p = hpNodePos(i);
    const isRoot = i === 0;
    const isHi = i === hpHi;
    const fill = isRoot ? 'var(--color-background-success)' : (isHi ? 'var(--color-background-warning)' : 'var(--color-background-info)');
    const tcol = isRoot ? 'var(--color-text-success)' : (isHi ? 'var(--color-text-warning)' : 'var(--color-text-info)');
    svg += '<circle cx="' + p.x + '" cy="' + p.y + '" r="19" style="fill:' + fill + '; stroke:var(--color-border-secondary)" stroke-width="1"/>';
    svg += '<text x="' + p.x + '" y="' + (p.y + 5) + '" text-anchor="middle" style="fill:' + tcol + '; font-size:15px; font-weight:500; font-family:var(--font-sans)">' + hp[i] + '</text>';
    svg += '<text x="' + p.x + '" y="' + (p.y - 26) + '" text-anchor="middle" style="fill:var(--color-text-tertiary); font-size:11px; font-family:var(--font-sans)">' + i + '</text>';
  }
  svg += '</svg>';
  document.getElementById('hp-tree').innerHTML = n ? svg : '<div style="color:var(--color-text-tertiary); padding:1.5rem 0; font-size:14px">' + t.emptyTree + '</div>';

  const arr = document.getElementById('hp-arr');
  arr.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex; flex-direction:column; align-items:center; gap:4px;';
    const cell = document.createElement('div');
    const isRoot = i === 0, isHi = i === hpHi;
    cell.style.cssText = 'width:46px; height:46px; border-radius:var(--border-radius-md); display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:500; border:0.5px solid var(--color-border-secondary);'
      + (isRoot ? 'background:var(--color-background-success); color:var(--color-text-success);' : isHi ? 'background:var(--color-background-warning); color:var(--color-text-warning);' : 'background:var(--color-background-info); color:var(--color-text-info);');
    cell.textContent = hp[i];
    const idx = document.createElement('div');
    idx.style.cssText = 'font-size:11px; color:var(--color-text-tertiary);';
    idx.textContent = '[' + i + ']';
    wrap.appendChild(cell); wrap.appendChild(idx);
    arr.appendChild(wrap);
  }
  // resolve current message in the active language
  var m = hpMsgKey, out = '';
  if (m.k === 'add') out = t.add.apply(null, m.val);
  else if (m.k === 'poll') { var nm = m.val[1]; out = t.poll(m.val[0], nm === null ? t.none : nm); }
  else out = t[m.k];
  document.getElementById('hp-msg').textContent = out;
}

window.onLangChange = hpRender;
hpRender();
</script>
<script src="../theme.js"></script>
<script src="../lang.js"></script>
</body>
</html>
