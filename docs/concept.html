<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concept — CoreCraft</title>
<script>(function(){try{var t=localStorage.getItem('jf-theme')||(window.matchMedia&&matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <a class="brand" href="index.html"><span class="dot"></span>← CoreCraft</a>
  <button id="theme-toggle" class="theme-toggle" onclick="toggleTheme()" aria-label="toggle theme">☾</button>
</div>

<article id="content" class="article">Loading…</article>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  var params = new URLSearchParams(location.search);
  var raw = params.get('doc') || 'hashmap-internals';
  var doc = raw.replace(/[^a-z0-9-]/g, '');   // whitelist slug — no path traversal
  var el = document.getElementById('content');

  fetch('concepts/' + doc + '.md')
    .then(function (r) { if (!r.ok) throw new Error(r.status); return r.text(); })
    .then(function (md) {
      el.innerHTML = marked.parse(md);
      var h1 = el.querySelector('h1');
      document.title = (h1 ? h1.textContent : doc) + ' — CoreCraft';
    })
    .catch(function () {
      el.innerHTML = '<p>Не удалось загрузить концепт «' + doc + '». '
        + '<a href="index.html">Вернуться на главную</a>.</p>';
    });
</script>
<script src="theme.js"></script>
</body>
</html>
