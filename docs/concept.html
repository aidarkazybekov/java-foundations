<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concept — CoreCraft</title>
<script>(function(){try{var t=localStorage.getItem('jf-theme')||(window.matchMedia&&matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);var l=localStorage.getItem('jf-lang')||((navigator.language||'en').slice(0,2)==='ru'?'ru':'en');document.documentElement.setAttribute('data-lang',l);}catch(e){}})();</script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <a class="brand" href="index.html"><span class="dot"></span>← CoreCraft</a>
  <div style="display:flex; gap:8px;">
    <button id="lang-toggle" class="theme-toggle" onclick="toggleLang()" aria-label="switch language" style="width:auto; padding:0 12px; font-size:13px; font-weight:600;">RU</button>
    <button id="theme-toggle" class="theme-toggle" onclick="toggleTheme()" aria-label="toggle theme">☾</button>
  </div>
</div>

<article id="content" class="article">Loading…</article>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  var params = new URLSearchParams(location.search);
  var raw = params.get('doc') || 'hashmap-internals';
  var doc = raw.replace(/[^a-z0-9-]/g, '');   // whitelist slug — no path traversal
  var el = document.getElementById('content');

  function curLang() { return document.documentElement.getAttribute('data-lang') || 'en'; }

  function loadDoc() {
    var l = curLang();
    var path = l === 'ru' ? 'concepts/ru/' + doc + '.md' : 'concepts/' + doc + '.md';
    fetch(path)
      .then(function (r) { if (!r.ok) throw new Error(r.status); return r.text(); })
      .then(function (md) {
        el.innerHTML = marked.parse(md);
        var h1 = el.querySelector('h1');
        document.title = (h1 ? h1.textContent : doc) + ' — CoreCraft';
      })
      .catch(function () {
        if (l === 'ru') {
          fetch('concepts/' + doc + '.md')
            .then(function (r) { return r.ok ? r.text() : Promise.reject(); })
            .then(function (md) { el.innerHTML = marked.parse(md); })
            .catch(showError);
        } else { showError(); }
      });
  }
  function showError() {
    el.innerHTML = '<p>Could not load “' + doc + '”. <a href="index.html">Back to home</a>.</p>';
  }

  window.onLangChange = loadDoc;
  loadDoc();
</script>
<script src="theme.js"></script>
<script src="lang.js"></script>
</body>
</html>
