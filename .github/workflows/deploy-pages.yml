name: Regenerate docs manifest

# Keeps docs/content.json in sync with the files in docs/concepts and
# docs/visualizations, so contributed items appear on the site automatically.
# GitHub Pages serves docs/ directly (Settings -> Pages -> Deploy from a branch -> /docs).

on:
  push:
    branches: [main]
    paths:
      - 'docs/concepts/**'
      - 'docs/visualizations/**'
      - 'docs/gen-manifest.mjs'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Regenerate content.json
        run: node docs/gen-manifest.mjs

      - name: Commit if changed
        run: |
          if ! git diff --quiet -- docs/content.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/content.json
            git commit -m "chore: regenerate docs/content.json [skip ci]"
            git push
          else
            echo "content.json already up to date"
          fi
